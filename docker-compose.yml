version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: fechapro-db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres123}
      POSTGRES_DB: ${DB_NAME:-fechapro}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      # Dados do PostgreSQL (persistem mesmo após docker-compose down)
      - ./data/postgres:/var/lib/postgresql/data
      # Backup automático
      - ./data/backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fechapro-network
    restart: unless-stopped

  # Backend Node.js
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: fechapro-api
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3099
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres123}
      DB_NAME: ${DB_NAME:-fechapro}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      XAI_API_KEY: ${XAI_API_KEY:-}
      IA_PROVIDER: ${IA_PROVIDER:-gemini}
      FOLLOWUP_CADENCIA_HORAS: ${FOLLOWUP_CADENCIA_HORAS:-24,48,72,168}
      FOLLOWUP_VERIFICACAO_MINUTOS: ${FOLLOWUP_VERIFICACAO_MINUTOS:-60}
      FOLLOWUP_SCORE_HOT_MIN: ${FOLLOWUP_SCORE_HOT_MIN:-2}
      FOLLOWUP_SCORE_WARM_MIN: ${FOLLOWUP_SCORE_WARM_MIN:-15}
      FOLLOWUP_SCORE_COLD_MIN: ${FOLLOWUP_SCORE_COLD_MIN:-120}
      FOLLOWUP_SCORE_LOW_MIN: ${FOLLOWUP_SCORE_LOW_MIN:-1440}
    ports:
      - "${API_PORT:-3099}:3099"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # Dados persistentes do backend
      - ./data/backups:/app/backend/backups
      - ./data/conhecimento:/app/backend/conhecimento
      - ./data/logs:/app/backend/logs
      - ./data/learning:/app/backend/learning
      - ./data/sessions:/app/backend/sessions
      # Base de conhecimento editavel e funil de vendas (crm-pipeline.json)
      - ./data/painel:/app/backend/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3099/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - fechapro-network
    restart: unless-stopped

  # Frontend React + Nginx
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: fechapro-web
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      - backend
    networks:
      - fechapro-network
    restart: unless-stopped

networks:
  fechapro-network:
    driver: bridge
