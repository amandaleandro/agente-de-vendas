<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Teste de Diagnóstico</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 12px;
      padding: 40px;
      max-width: 600px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    h1 {
      color: #333;
      margin: 0 0 10px 0;
    }
    .subtitle {
      color: #666;
      margin-bottom: 30px;
      font-size: 14px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
      color: #333;
    }
    input, select {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
    }
    input:focus, select:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    button {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 14px 28px;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      margin-top: 10px;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .message {
      margin-top: 20px;
      padding: 15px;
      border-radius: 6px;
      display: none;
    }
    .success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    .error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
    .loading {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 3px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 1s ease-in-out infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .code-block {
      background: #f5f5f5;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 15px;
      margin-top: 10px;
      font-family: monospace;
      font-size: 13px;
      word-break: break-all;
      color: #333;
    }
    .tips {
      background: #e7f3ff;
      border-left: 4px solid #2196F3;
      padding: 15px;
      margin: 20px 0;
      border-radius: 4px;
      font-size: 14px;
      color: #1565c0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🧪 Teste de Diagnóstico</h1>
    <p class="subtitle">Simule um diagnóstico e veja como o bot responde</p>

    <div class="tips">
      💡 Este formulário simula o que a página fechapro.com.br/diagnostico enviaria para o backend.
    </div>

    <form id="form">
      <div class="row">
        <div class="form-group">
          <label>Nome do Cliente *</label>
          <input type="text" id="nome" value="Carlos" required>
        </div>
        <div class="form-group">
          <label>Empresa *</label>
          <input type="text" id="empresa" value="Carlos Reformas" required>
        </div>
      </div>

      <div class="row">
        <div class="form-group">
          <label>Segmento</label>
          <input type="text" id="segmento" value="Construção e reforma">
        </div>
        <div class="form-group">
          <label>Telefone</label>
          <input type="tel" id="telefone" value="34999999999" placeholder="+55 11 99999-9999">
        </div>
      </div>

      <div class="form-group">
        <label>Nota Geral (0-100) *</label>
        <input type="number" id="nota_geral" min="0" max="100" value="38" required>
      </div>

      <div class="row">
        <div class="form-group">
          <label>Presença e Confiança (0-100)</label>
          <input type="number" id="nota_presenca_confianca" min="0" max="100" value="25">
        </div>
        <div class="form-group">
          <label>Atendimento (0-100)</label>
          <input type="number" id="nota_atendimento" min="0" max="100" value="52">
        </div>
      </div>

      <div class="row">
        <div class="form-group">
          <label>Apresentação (0-100)</label>
          <input type="number" id="nota_apresentacao" min="0" max="100" value="44">
        </div>
        <div class="form-group">
          <label>Fechamento (0-100)</label>
          <input type="number" id="nota_fechamento" min="0" max="100" value="30">
        </div>
      </div>

      <div class="form-group">
        <label>Principal Gargalo *</label>
        <select id="principal_gargalo" required>
          <option value="">Selecione...</option>
          <option value="Presença e confiança" selected>Presença e confiança</option>
          <option value="Atendimento">Atendimento</option>
          <option value="Apresentação">Apresentação</option>
          <option value="Fechamento">Fechamento</option>
        </select>
      </div>

      <button type="submit">🚀 Enviar Diagnóstico</button>
    </form>

    <div id="message" class="message"></div>

    <div id="resultado"></div>
  </div>

  <script>
    const form = document.getElementById('form');
    const messageEl = document.getElementById('message');
    const resultEl = document.getElementById('resultado');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const dados = {
        diagnostico_id: `DIA-${Date.now().toString().slice(-6)}`,
        nome: document.getElementById('nome').value,
        empresa: document.getElementById('empresa').value,
        segmento: document.getElementById('segmento').value,
        telefone: document.getElementById('telefone').value,
        nota_geral: parseInt(document.getElementById('nota_geral').value),
        nota_presenca_confianca: parseInt(document.getElementById('nota_presenca_confianca').value),
        nota_atendimento: parseInt(document.getElementById('nota_atendimento').value),
        nota_apresentacao: parseInt(document.getElementById('nota_apresentacao').value),
        nota_fechamento: parseInt(document.getElementById('nota_fechamento').value),
        principal_gargalo: document.getElementById('principal_gargalo').value,
        respostas_brutas: { /* aqui viriam as 12 respostas reais */ }
      };

      try {
        messageEl.textContent = 'Enviando...';
        messageEl.className = 'message';
        messageEl.style.display = 'block';
        resultEl.innerHTML = '';

        const response = await fetch('/api/diagnostico/salvar', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(dados)
        });

        const resultado = await response.json();

        if (!response.ok) {
          throw new Error(resultado.erro || 'Erro ao salvar diagnóstico');
        }

        messageEl.textContent = '✅ Diagnóstico salvo com sucesso!';
        messageEl.className = 'message success';

        // Mostrar resultado
        resultEl.innerHTML = `
          <h3 style="color: #333; margin-top: 30px;">📊 Resultado</h3>
          <div class="code-block">
            <strong>Código do diagnóstico:</strong><br>
            ${resultado.diagnostico_id}
            <br><br>
            <strong>Categoria:</strong> ${resultado.categoria}<br>
            <strong>Dor principal:</strong> ${resultado.dor_principal}<br>
          </div>

          <h3 style="color: #333; margin-top: 20px;">💬 Próximo Passo</h3>
          <p>O cliente deve enviar uma mensagem WhatsApp com:</p>
          <div class="code-block">
Olá! Acabei de fazer meu diagnóstico no FechaPro.

Código: ${resultado.diagnostico_id}
Quero entender como corrigir os problemas encontrados.
          </div>

          <p style="color: #666; font-size: 13px; margin-top: 20px;">
            O bot deve detectar o código e responder com a análise personalizada.
          </p>
        `;

      } catch (err) {
        messageEl.textContent = '❌ ' + err.message;
        messageEl.className = 'message error';
      }
    });
  </script>
</body>
</html>
