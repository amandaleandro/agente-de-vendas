<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fezinha Painel</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
        }
        h1 { color: #667eea; margin-bottom: 10px; }
        .subtitle { color: #666; margin-bottom: 30px; }
        .status {
            padding: 15px;
            background: #f0f0f0;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .status-ok { background: #d4edda; color: #155724; }
        .status-error { background: #f8d7da; color: #721c24; }
        button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        .btn-primary {
            background: #667eea;
            color: white;
        }
        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        .info {
            background: #e7f3ff;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 13px;
            border-left: 4px solid #2196F3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 Fezinha</h1>
        <p class="subtitle">Agente de Vendas Inteligente</p>

        <div class="status" id="status">
            <span id="status-text">Carregando...</span>
        </div>

        <button class="btn-primary" onclick="checkStatus()">Verificar Status</button>
        <button class="btn-primary" onclick="startProspecting()">Iniciar Prospecção</button>

        <div class="info">
            <strong>📱 QR Codes:</strong><br>
            Escaneie os QR codes no terminal para conectar seus números de WhatsApp.
        </div>
    </div>

    <script>
        function updateStatus() {
            fetch('/api/status')
                .then(r => r.json())
                .then(data => {
                    const statusEl = document.getElementById('status');
                    const statusText = document.getElementById('status-text');

                    if (data.conectado) {
                        statusEl.className = 'status status-ok';
                        statusText.textContent = `✅ WhatsApp conectado! (${data.numerosConectados}/${data.numerosConfigurados} números)`;
                    } else {
                        statusEl.className = 'status status-error';
                        statusText.textContent = '❌ Aguardando conexão WhatsApp...';
                    }
                })
                .catch(e => {
                    document.getElementById('status').className = 'status status-error';
                    document.getElementById('status-text').textContent = '❌ Erro ao conectar com servidor';
                });
        }

        function checkStatus() {
            updateStatus();
        }

        function startProspecting() {
            if (!confirm('Iniciar prospecção de contatos?')) return;

            fetch('/api/iniciar', { method: 'POST' })
                .then(r => r.json())
                .then(data => {
                    alert(data.mensagem || 'Prospecção iniciada!');
                    updateStatus();
                })
                .catch(e => alert('Erro ao iniciar prospecção'));
        }

        // Atualizar status ao carregar
        updateStatus();
        setInterval(updateStatus, 5000);
    </script>
</body>
</html>
