<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Fezinha — Analytics</title><style>*{box-sizing:border-box}body{margin:0;background:#f3f7f4;color:#18221c;font:16px system-ui}.box{max-width:1000px;margin:30px auto;padding:22px}.card{background:white;border:1px solid #dce7df;border-radius:20px;padding:24px;margin-bottom:20px;box-shadow:0 18px 50px #173c2520}h1{margin:0 0 8px}.sub{color:#637169}.status{display:inline-block;background:#edf4ef;border-radius:99px;padding:8px 13px;margin:12px 0 12px;font-size:14px}.row{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:20px}.metric{background:#f9fcfa;border-radius:12px;padding:16px}.metric-label{color:#637169;font-size:13px;margin-bottom:6px}.metric-value{font-size:28px;font-weight:700;color:#147943}.metric-unit{color:#637169;font-size:13px}.table-container{overflow-x:auto}table{width:100%;border-collapse:collapse;font-size:14px;margin-top:12px}th,td{text-align:left;padding:10px 8px;border-bottom:1px solid #e6ece8}th{background:#f3f7f4;font-weight:700}.bar{height:20px;background:#91ac99;border-radius:6px;display:inline-block;min-width:20px;margin:4px 0}.bar.good{background:#147943}.bar.warning{background:#d97706}.link{color:#147943;text-decoration:none;cursor:pointer;margin-right:12px}.link:hover{text-decoration:underline}.back{margin-bottom:20px}.hint{font-size:13px;color:#69766e;margin-top:12px}</style></head><body><main class="box"><div class="back"><a class="link" onclick="window.location='/'">← Voltar ao painel</a></div><h1>📊 Analytics em Tempo Real</h1><p class="sub">Respostas de IA, warmup, tank e conversion rates.</p><div id="status" class="status">Conectando…</div><div id="content"></div></main><script>const apiKey=localStorage.getItem('painel_api_key')||prompt('Digite sua API key (salva em localStorage):');localStorage.setItem('painel_api_key',apiKey);const headers={'x-api-key':apiKey};async function carregar(){try{const r=await fetch('/api/analytics',{headers}),d=r.ok?await r.json():{};if(!r.ok){document.getElementById('status').textContent='❌ Erro: '+await r.text();return}const analytics=d.analytics||{},warmup=d.warmup||[],tank=d.tank||{},taxa=d.taxaResposta||[],leads=d.leads||0,conversas=d.conversas||0;let html='<div class="card"><h2>📱 Leads e Conversas</h2><div class="row"><div class="metric"><div class="metric-label">Total de Leads</div><div class="metric-value">'+leads+'</div></div><div class="metric"><div class="metric-label">Total de Conversas</div><div class="metric-value">'+conversas+'</div></div></div></div>';html+='<div class="card"><h2>🧠 Performance da IA</h2><div class="row"><div class="metric"><div class="metric-label">Respostas Hoje</div><div class="metric-value">'+analytics.total+'</div></div><div class="metric"><div class="metric-label">Via IA</div><div class="metric-value">'+analytics.iaPercent+'%</div></div><div class="metric"><div class="metric-label">Via Roteiro</div><div class="metric-value">'+analytics.roteiroPercent+'%</div></div><div class="metric"><div class="metric-label">Tamanho Médio</div><div class="metric-value">'+analytics.tamanhoMedio+'<span class="metric-unit">char</span></div></div><div class="metric"><div class="metric-label">Truncadas</div><div class="metric-value">'+analytics.truncadas+'</div></div></div></div>';html+='<div class="card"><h2>🔥 Warmup</h2><div class="table-container"><table><tr><th>Sessão</th><th>Status</th><th>Enviados/Quota</th><th>Taxa</th><th>Erros</th></tr>';warmup.forEach(w=>{const pct=Math.round((w.enviados/w.quota)*100);html+='<tr><td>'+w.sessao+'</td><td>'+w.nivelTexto+'</td><td>'+w.enviados+'/'+w.quota+'</td><td><div class="bar '+(pct>90?'warning':'good')+'" style="width:'+Math.min(pct,100)+'px"></div> '+pct+'%</td><td>'+w.erros+'</td></tr>'});html+='</table></div></div>';html+='<div class="card"><h2>💬 Tank - Fila de Mensagens</h2><div class="row"><div class="metric"><div class="metric-label">Mensagens Totais</div><div class="metric-value">'+tank.totalMensagens+'</div></div><div class="metric"><div class="metric-label">Enviadas</div><div class="metric-value">'+tank.enviadas+'</div></div><div class="metric"><div class="metric-label">Pendentes</div><div class="metric-value">'+tank.pendentes+'</div></div><div class="metric"><div class="metric-label">Contatos</div><div class="metric-value">'+tank.totalContatos+'</div></div></div></div>';html+='<div class="card"><h2>📈 Taxa de Resposta por Posição (Tank)</h2>';if(taxa.length>0){html+='<div class="table-container"><table><tr><th>Posição</th><th>Enviadas</th><th>Respondidas</th><th>Taxa</th></tr>';taxa.forEach(t=>{html+='<tr><td>Mensagem '+t.posicao+'</td><td>'+t.enviadas+'</td><td>'+t.respondidas+'</td><td><div class="bar good" style="width:'+t.taxa+'px"></div> '+t.taxa+'%</td></tr>'});html+='</table></div>'}else{html='<p class="hint">Nenhum dado de resposta do Tank ainda. Inicie uma campanha para ver métricas.</p>'}html+='</div>';document.getElementById('content').innerHTML=html;document.getElementById('status').textContent='✅ Dados atualizados às '+new Date().toLocaleTimeString('pt-BR')}catch(e){console.error(e);document.getElementById('status').textContent='❌ Erro: '+e.message;document.getElementById('content').innerHTML='<p class="hint">Verifique a API key e a conexão com o servidor.</p>'}}carregar();setInterval(carregar,10000);</script></body></html>
