<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Scan QR</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            padding: 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: white;
        }
        .box {
            background: white;
            color: #333;
            padding: 40px;
            border-radius: 15px;
            max-width: 600px;
            margin: 0 auto;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        h1 { font-size: 2em; margin-bottom: 20px; }
        .qr {
            background: #f0f0f0;
            padding: 20px;
            margin: 20px 0;
            border: 2px dashed #667eea;
            border-radius: 10px;
            font-family: monospace;
            word-break: break-all;
            max-height: 300px;
            overflow-y: auto;
            font-size: 11px;
        }
        .btn {
            background: #667eea;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            width: 100%;
            margin: 10px 0;
        }
        .btn:hover { opacity: 0.9; }
        .status {
            padding: 15px;
            background: #fff3cd;
            border-radius: 8px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>🤖 Fezinha</h1>
        <p>Vincule seu WhatsApp</p>

        <div class="status" id="status">
            ⏳ Aguardando QR Code...
        </div>

        <div class="qr" id="qr">
            Carregando...
        </div>

        <a id="link" href="#" class="btn">
            ✅ Abrir WhatsApp
        </a>

        <button class="btn" onclick="location.reload()">
            🔄 Recarregar
        </button>

        <p style="margin-top: 30px; font-size: 0.9em;">
            Aponte a câmera do celular para o QR acima
        </p>
    </div>

    <script>
        // Ler QR Code do arquivo
        fetch('/backend/qrcode.txt')
            .then(r => r.text())
            .then(text => {
                document.getElementById('qr').textContent = text;
                document.getElementById('link').href = text;
                document.getElementById('status').textContent = '✅ QR Code Pronto!';
                document.getElementById('status').style.background = '#d4edda';
            })
            .catch(() => {
                // Se não conseguir, mostrar mensagem
                document.getElementById('qr').textContent = '❌ QR Code ainda não gerado';
                document.getElementById('status').textContent = '⏳ Aguarde o bot gerar o QR Code...';
                setTimeout(() => location.reload(), 3000);
            });
    </script>
</body>
</html>
