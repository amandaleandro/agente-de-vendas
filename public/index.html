<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Fezinha — Prospecção</title><style>
*{box-sizing:border-box}body{margin:0;background:#f3f7f4;color:#18221c;font:16px system-ui}.box{max-width:820px;margin:55px auto;padding:22px}.card{background:white;border:1px solid #dce7df;border-radius:20px;padding:32px;box-shadow:0 18px 50px #173c2520}h1{margin:0 0 8px}.sub{color:#637169}.status{display:inline-block;background:#edf4ef;border-radius:99px;padding:8px 13px;margin:12px 0 22px}.drop{display:block;border:2px dashed #91ac99;border-radius:14px;padding:32px;text-align:center;cursor:pointer;background:#f9fcfa}input{display:none}button{border:0;border-radius:10px;padding:13px 18px;margin:16px 8px 0 0;background:#147943;color:white;font-weight:700;cursor:pointer}button:disabled{opacity:.4}.sec{background:#e6f0e9;color:#185e38}.msg{display:none;margin-top:16px;padding:12px;background:#eef5f0;border-radius:10px}.err{background:#fff0ee;color:#9b2922}table{width:100%;border-collapse:collapse;margin-top:18px;font-size:14px}th,td{text-align:left;padding:9px 5px;border-bottom:1px solid #e6ece8}.hint{font-size:13px;color:#69766e}</style></head><body><main class="box"><section class="card"><h1>Lista de prospecção</h1><p class="sub">Envie o CSV, confira a amostra e inicie quando estiver tudo certo.</p><div style="margin-bottom:16px"><a href="/analytics.html" style="color:#147943;text-decoration:none;font-weight:700">📊 Ver Analytics →</a></div><div id="status" class="status">Verificando WhatsApp…</div><label class="drop">Clique para selecionar sua planilha CSV<input id="file" type="file" accept=".csv,text/csv"></label><button id="load" class="sec" disabled>Carregar e conferir</button><button id="start" disabled>Iniciar prospecção</button><div id="msg" class="msg"></div><div id="preview"></div><p class="hint">Limite: 20 contatos por hora. O terminal deve permanecer aberto.</p></section></main><script>
const apiKey=sessionStorage.getItem('painel_api_key')||prompt('Digite sua API key (ou deixe em branco para modo dev):');if(apiKey)sessionStorage.setItem('painel_api_key',apiKey);const headers={'Content-Type':'application/json'};if(apiKey)headers['x-api-key']=apiKey;const $=s=>document.querySelector(s),file=$('#file'),load=$('#load'),start=$('#start'),msg=$('#msg'),preview=$('#preview');let pronta=false;function say(t,e=false){msg.textContent=t;msg.style.display='block';msg.className='msg'+(e?' err':'')}function esc(v){const x=document.createElement('div');x.textContent=v||'—';return x.innerHTML}function makeHeaders(){const h={'Content-Type':'application/json'};if(apiKey)h['x-api-key']=apiKey;return h}file.onchange=()=>{load.disabled=!file.files[0];pronta=false;start.disabled=true};load.onclick=async()=>{try{load.disabled=true;say('Lendo a lista…');const r=await fetch('/api/lista',{method:'POST',headers:makeHeaders(),body:JSON.stringify({conteudo:await file.files[0].text()})}),d=await r.json();if(!r.ok)throw Error(d.erro);pronta=true;say(`${d.total} contatos válidos encontrados.`);preview.innerHTML='<table><tr><th>Empresa</th><th>Telefone</th><th>Segmento</th></tr>'+d.amostra.map(x=>`<tr><td>${esc(x.nome)}</td><td>${esc(x.telefone)}</td><td>${esc(x.categoria)}</td></tr>`).join('')+'</table>';status()}catch(e){say(e.message,true)}finally{load.disabled=false}};start.onclick=async()=>{if(!confirm('Confirma o início dos envios?'))return;const r=await fetch('/api/iniciar',{method:'POST',headers:makeHeaders()}),d=await r.json();say(d.mensagem||d.erro,!r.ok);status()};async function status(){try{const d=await(await fetch('/api/status')).json();$('#status').textContent=d.conectado?'● WhatsApp conectado':'● WhatsApp desconectado';start.disabled=!pronta||!d.conectado||d.executando}catch{}}status();setInterval(status,5000);
</script></body></html>
